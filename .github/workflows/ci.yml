name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build C ABI plugin
        run: |
          mkdir -p dist
          CGO_ENABLED=1 go build -buildvcs=false -trimpath -buildmode=c-shared \
            -ldflags "-s -w -X main.pluginVersion=ci" \
            -o dist/opencode-go-pool-ci.so ./src
